<template>
    <template if:true={loaded}>
        <lightning-card title="EmailToLead AI Config" icon-name="utility:robot">
            <div class="page-container">
                <lightning-record-edit-form object-api-name="EmailToLead_Ai__AI_Configure__c" record-id={configId}
                    onsubmit={handleSubmit} onsuccess={handleSuccess}>
                    <lightning-messages></lightning-messages>

                    <!-- Model picklist -->
                    <lightning-combobox name="model" label="Model" value={modelValue} options={modelOptions}
                        onchange={handleModelChange} placeholder="Select Model">
                    </lightning-combobox>


                    <!-- Prompts -->
                    <div class="prompt-grid">
                        <lightning-textarea class="prompt-textarea" label="System Prompt" value={systemPrompt}
                            onchange={handleSystemPromptChange}>
                        </lightning-textarea>

                        <lightning-textarea class="prompt-textarea" label="User Prompt" value={userPrompt}
                            onchange={handleUserPromptChange}>
                        </lightning-textarea>
                    </div>

                    <!-- Actions -->
                    <div class="actions">
                        <lightning-button variant="brand" type="submit" label="Save"></lightning-button>

                        <lightning-button variant="neutral" label="Reset" onclick={handleReset}></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </lightning-card>
    </template>
</template>
